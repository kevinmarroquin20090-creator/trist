<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girasoles 🌻</title>

<style>

body{
    margin:0;
    overflow:hidden;
    height:100vh;
    background:linear-gradient(to bottom,#081229,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

/* LUNA */

.moon{
    position:absolute;
    top:50px;
    left:70px;
    width:130px;
    height:130px;
    background:#fff3c4;
    border-radius:50%;
    box-shadow:0 0 50px #fff3c4;
}

/* TEXTO */

.text{
    position:absolute;
    left:70px;
    bottom:120px;
    color:white;
}

.text h1{
    font-size:60px;
    color:#ffd54f;
}

.text p{
    font-size:24px;
    line-height:1.5;
}

/* RAMO */

.bouquet{
    position:relative;
    width:500px;
    height:500px;
}

/* GIRASOL */

.sunflower{
    position:absolute;
    width:140px;
    height:140px;
    transform:scale(0);
    opacity:0;
    animation:grow 2s ease forwards;
}

/* TALLO */

.stem{
    position:absolute;
    width:10px;
    height:180px;
    background:#4caf50;
    left:65px;
    top:100px;
}

/* CENTRO */

.center{
    position:absolute;
    width:55px;
    height:55px;
    background:#3e2723;
    border-radius:50%;
    top:42px;
    left:42px;
    z-index:10;
}

/* PETALOS */

.petal{
    position:absolute;
    width:40px;
    height:70px;
    background:gold;
    border-radius:50%;
    left:50px;
    top:0px;
    transform-origin:center 70px;
}

/* POSICIONES */

.s1{
    left:50px;
    top:180px;
    animation-delay:0s;
}

.s2{
    left:180px;
    top:100px;
    animation-delay:0.8s;
}

.s3{
    left:310px;
    top:180px;
    animation-delay:1.6s;
}

/* ANIMACIÓN */

@keyframes grow{

    0%{
        transform:scale(0);
        opacity:0;
    }

    60%{
        transform:scale(1.1);
        opacity:1;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="moon"></div>

<div class="text">
    <h1>Contigo 🌻</h1>
    <p>
        Cada noche contigo<br>
        se siente mágica ✨
    </p>
</div>

<div class="bouquet">

    <!-- GIRASOL 1 -->

    <div class="sunflower s1">

        <div class="stem"></div>

        <div class="petal" style="transform:rotate(0deg)"></div>
        <div class="petal" style="transform:rotate(30deg)"></div>
        <div class="petal" style="transform:rotate(60deg)"></div>
        <div class="petal" style="transform:rotate(90deg)"></div>
        <div class="petal" style="transform:rotate(120deg)"></div>
        <div class="petal" style="transform:rotate(150deg)"></div>
        <div class="petal" style="transform:rotate(180deg)"></div>
        <div class="petal" style="transform:rotate(210deg)"></div>
        <div class="petal" style="transform:rotate(240deg)"></div>
        <div class="petal" style="transform:rotate(270deg)"></div>
        <div class="petal" style="transform:rotate(300deg)"></div>
        <div class="petal" style="transform:rotate(330deg)"></div>

        <div class="center"></div>

    </div>

    <!-- GIRASOL 2 -->

    <div class="sunflower s2">

        <div class="stem"></div>

        <div class="petal" style="transform:rotate(0deg)"></div>
        <div class="petal" style="transform:rotate(30deg)"></div>
        <div class="petal" style="transform:rotate(60deg)"></div>
        <div class="petal" style="transform:rotate(90deg)"></div>
        <div class="petal" style="transform:rotate(120deg)"></div>
        <div class="petal" style="transform:rotate(150deg)"></div>
        <div class="petal" style="transform:rotate(180deg)"></div>
        <div class="petal" style="transform:rotate(210deg)"></div>
        <div class="petal" style="transform:rotate(240deg)"></div>
        <div class="petal" style="transform:rotate(270deg)"></div>
        <div class="petal" style="transform:rotate(300deg)"></div>
        <div class="petal" style="transform:rotate(330deg)"></div>

        <div class="center"></div>

    </div>

    <!-- GIRASOL 3 -->

    <div class="sunflower s3">

        <div class="stem"></div>

        <div class="petal" style="transform:rotate(0deg)"></div>
        <div class="petal" style="transform:rotate(30deg)"></div>
        <div class="petal" style="transform:rotate(60deg)"></div>
        <div class="petal" style="transform:rotate(90deg)"></div>
        <div class="petal" style="transform:rotate(120deg)"></div>
        <div class="petal" style="transform:rotate(150deg)"></div>
        <div class="petal" style="transform:rotate(180deg)"></div>
        <div class="petal" style="transform:rotate(210deg)"></div>
        <div class="petal" style="transform:rotate(240deg)"></div>
        <div class="petal" style="transform:rotate(270deg)"></div>
        <div class="petal" style="transform:rotate(300deg)"></div>
        <div class="petal" style="transform:rotate(330deg)"></div>

        <div class="center"></div>

    </div>

</div>

</body>
</html>
